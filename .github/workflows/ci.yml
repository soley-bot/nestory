name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  application:
    name: Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  database:
    name: Database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase
        run: npm run supabase:start

      - name: Reset database
        run: npm run db:reset

      - name: Lint database
        run: npm run db:lint

      - name: Verify generated database types
        run: |
          npm run db:types
          git diff --exit-code -- src/types/database.generated.ts

      - name: Test database
        run: npx supabase test db --local supabase/tests

      - name: Stop local Supabase
        if: always()
        run: npm run supabase:stop
