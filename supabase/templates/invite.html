<!doctype html>
<html lang="en">
  <body style="background:#f4f4f1;color:#1e2523;font-family:Arial,sans-serif;margin:0;padding:32px">
    <main style="background:#fff;border:1px solid #dedfd9;border-radius:8px;margin:auto;max-width:520px;padding:32px">
      <h1 style="font-size:22px;margin:0 0 12px">Your Nestory workspace invitation</h1>
      <p style="font-size:15px;line-height:1.6;margin:0 0 24px">Verify this email address, review the workspace access assigned to you, and create a password.</p>
      <a href="{{ .ConfirmationURL }}" style="background:#1e2523;border-radius:6px;color:#fff;display:inline-block;font-size:14px;font-weight:600;padding:12px 18px;text-decoration:none">Review invitation</a>
      <p style="color:#68706d;font-size:12px;line-height:1.6;margin:24px 0 0">If you were not expecting this invitation, you can ignore this email.</p>
    </main>
  </body>
</html>
